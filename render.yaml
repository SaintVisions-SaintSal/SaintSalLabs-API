services:
  - type: web
    name: saintsallabs-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # REQUIRED — server won't start without this
      - key: API_SECRET
        sync: false
      # AI Providers
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_FALLBACK
        sync: false
      - key: XAI_API_KEY
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Voice
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      # Payments
      - key: STRIPE_SECRET_KEY
        sync: false
      # Social — Twitter
      - key: TWITTER_CONSUMER_KEY
        sync: false
      - key: TWITTER_CONSUMER_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_SECRET_TOKEN
        sync: false
      # Social — LinkedIn
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      # CorpNet
      - key: CORPNET_ENV
        sync: false
      - key: CORPNET_BEARER_TOKEN
        sync: false
      - key: CORPNET_API_KEY
        sync: false
